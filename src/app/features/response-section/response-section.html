<div class="response-section">
  <div class="response-header d-flex justify-content-between align-items-center flex-wrap gap-2">
    <div class="response-meta d-flex gap-4">
      <span><i class="fas fa-circle text-success me-1 status-icon"></i> <strong>Status:</strong> 200 OK</span>
      <span><i class="fas fa-clock me-1"></i> <strong>Time:</strong> 120ms</span>
      <span><i class="fas fa-database me-1"></i> <strong>Size:</strong> 1.2KB</span>
    </div>
    <button class="btn btn-sm btn-outline-secondary">
      <i class="fas fa-save me-1"></i> Save Response
    </button>
  </div>
<div class="response-body">
      @if(response()) {
        <ngx-json-viewer [json]="response()"></ngx-json-viewer>
      } @else {
        <div class="text-muted text-center py-5">No response yet</div>
      }
    </div>
</div>
