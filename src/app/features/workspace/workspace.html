<main class="workspace">
  <app-tab-navigation></app-tab-navigation>

  <div class="tab-content-area">
    @for (tab of tabs(); track tab.tabId) {
      <div [hidden]="activeTabId() !== tab.tabId">
        <app-request-bar [tabId]="tab.tabId"></app-request-bar>

        <div class="d-flex justify-content-start mb-2">
          <button class="btn-toggle-tabs" (click)="toggleTabs()">
            <i class="fas" [class.fa-chevron-down]="isTabsCollapsed()" [class.fa-chevron-up]="!isTabsCollapsed()"></i>
            {{ isTabsCollapsed() ? 'Show Details' : 'Collapse Details' }}
          </button>
        </div>

        <div class="tabs-wrapper" [class.hidden]="isTabsCollapsed()">
          <app-request-tabs [tabId]="tab.tabId"></app-request-tabs>
        </div>

        <app-response-section [tabId]="tab.tabId" [class.expanded]="isTabsCollapsed()"></app-response-section>
      </div>
    }
  </div>
</main>
