<div class="collection-item">
  <div class="collection-header" (click)="toggleExpand()">
    <div class="d-flex align-items-center w-100">
      <i class="fas fa-chevron-down toggle-icon me-2"
         [class.rotated]="!isExpanded()"></i>

      <i class="fas fa-folder me-2 text-info"></i>

      <span class="fw-semibold text-truncate">{{ title() }}</span>

      <span class="badge ms-auto">{{ requests().length }}</span>
    </div>
  </div>

  <div class="requests-wrapper" [class.expanded]="isExpanded()">
    <div class="requests-list">
      @for (req of requests(); track req.name) {
        <app-request-item
          [method]="req.method"
          [name]="req.name"
          (onClick)="handleRequestClick(req)">
        </app-request-item>
      }
    </div>
  </div>
</div>
