<div class="sidebar">
  <div class="p-3">
    <!-- Action Buttons Row -->
    <div class="d-flex gap-2 mb-4">
      <!-- New Request Button (más pequeño) -->
      <button class="btn btn-primary new-request-btn" (click)="toggleCreateMode()">
        <i class="fas fa-plus me-1"></i> New
      </button>

      <!-- Import Button -->
      <button class="btn btn-outline-secondary import-btn" (click)="handleImport()">
        <i class="fas fa-upload me-1"></i> Import
      </button>

    </div>

    @if (isCreating()) {
      <div class="input-group mb-3 animate__animated animate__fadeIn">
        <input [(ngModel)]="newCollectionName"
               (keyup.enter)="saveNewCollection()"
               placeholder="Nombre de la colección..."
               class="form-control form-control-sm"
               autofocus />
        <button class="btn btn-outline-success" (click)="saveNewCollection()">
          <i class="fas fa-check"></i>
        </button>
      </div>
    }

    <!-- Search Field -->
    <div class="mb-4 position-relative">
      <i class="fas fa-search search-icon"></i>
      <input type="text" class="form-control search-input" placeholder="Search collections"
        (input)="handleSearch($event)">
    </div>

    <!-- Collections Title -->
    <div class="text-uppercase small fw-bold text-secondary mb-3">
      Collections
    </div>

    <!-- Collections -->
    <div class="accordion" id="collectionsAccordion">
      @for (collection of collections(); track collection.id) {
      <app-collection-item
        [title]="collection.title"
        [icon]="collection.icon"
        [requests]="collection.requests">
      </app-collection-item>
      }
    </div>
  </div>
</div>
